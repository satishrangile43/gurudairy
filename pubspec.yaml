name: gurudiary
description: "A 100% offline personal diary for teachers."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # --- Offline Database & Storage ---
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  shared_preferences: ^2.2.3

  # --- Editor (MS Word features) ---
  flutter_quill: ^11.5.0 
  flutter_quill_extensions: ^11.0.0 
  image_picker: ^1.0.7
  flutter_colorpicker: ^1.1.0
  printing: ^5.11.0

  # --- Reminders & Notifications ---
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

  # --- File Handling ---
  pdf: ^3.10.8
  excel: ^4.0.6
  open_file: ^3.3.2

  # --- UI & Utilities ---
  intl: ^0.20.2  # <--- Bhai, isko update kar diya hai error ke hisaab se
  table_calendar: ^3.1.2
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true