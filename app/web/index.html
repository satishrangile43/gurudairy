<!DOCTYPE html>
<html lang="en">
<head>
  <base href="/gurudairy/app/web/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="GuruDiary Web Portal - The Operating System for Teachers.">

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <meta name="theme-color" content="#f5f5f7">

  <meta name="google-signin-client_id" content="492043149131-mellrh8sv5h99tc7h4bugpffffa5ke42.apps.googleusercontent.com">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"> 
  <meta name="apple-mobile-web-app-title" content="GuruDiary">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png">

  <title>GuruDiary Web</title>
  <link rel="manifest" href="manifest.json">
  
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  
  <style id="splash-screen-style">
    /* 🔥 NEW ANIMATED SPLASH SCREEN CSS */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background-color: #f5f5f7; /* Mac Bright background */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden; 
    }

    /* The Glowing Spinner */
    .loader {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(0, 122, 255, 0.1);
      border-left-color: #007aff; /* Apple Blue */
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 30px;
      box-shadow: 0 0 20px rgba(0, 122, 255, 0.2);
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Professional Text */
    .brand-title {
      font-size: 28px;
      font-weight: 800;
      color: #1d1d1f;
      letter-spacing: -1px;
      margin: 0 0 8px 0;
    }

    .brand-title span {
      color: #007aff;
    }

    .sub-title {
      font-size: 13px;
      font-weight: 600;
      color: #86868b;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Pulse animation for the subtitle */
    .pulse-text {
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.5; }
      50% { opacity: 1; }
      100% { opacity: 0.5; }
    }
  </style>

  <script>
    // Security Script
    document.addEventListener('contextmenu', event => event.preventDefault());
    document.onkeydown = function(e) {
      if (e.keyCode == 123) return false; 
      if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false; 
      if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false; 
      if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false; 
      if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; 
    };
  </script>
</head>
<body>

  <noscript>
    <div style="text-align: center; padding: 20px; font-family: sans-serif; color: #333;">
      <h2>JavaScript is Required</h2>
      <p>Please enable JavaScript to launch GuruDiary.</p>
    </div>
  </noscript>

  <div id="splash">
    <div class="loader"></div>
    <h1 class="brand-title">GuruDiary <span>Web</span></h1>
    <div class="sub-title pulse-text">Initializing Secure Console...</div>
  </div>
  
  <script>
    // Flutter boot script
    // This script will automatically remove the #splash div when the app is ready.
    window.addEventListener('load', function() {
      var loading = document.querySelector('#splash');
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: serviceWorkerVersion,
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            loading.remove(); // Removes our custom loader
            appRunner.runApp();
          });
        }
      });
    });
  </script>

  <script src="flutter_bootstrap.js"></script>

</body>
</html>
