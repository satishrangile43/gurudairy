<!DOCTYPE html>
<html lang="en">
<head>
  <base href="/gurudairy/app/web/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="GuruDiary Web Portal - The Operating System for Teachers.">

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <meta name="theme-color" content="#E0E5EC">

  <meta name="google-signin-client_id" content="492043149131-mellrh8sv5h99tc7h4bugpffffa5ke42.apps.googleusercontent.com">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"> 
  <meta name="apple-mobile-web-app-title" content="GuruDiary">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png">

  <title>GuruDiary Web</title>
  <link rel="manifest" href="manifest.json">
  
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
  
  <style id="splash-screen-style">
    html {
      height: 100%;
    }
    body {
      margin: 0;
      min-height: 100%;
      background-color: #E0E5EC;
      background-size: 100% 100%;
      /* Background scroll hone se rokne ke liye */
      overflow: hidden; 
    }
    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
  </style>

  <script>
    // Right-click aur Inspect element disable karne ke liye (Basic Security)
    document.addEventListener('contextmenu', event => event.preventDefault());
    document.onkeydown = function(e) {
      if (e.keyCode == 123) return false; // F12
      if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false; // Ctrl+Shift+I
      if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false; // Ctrl+Shift+C
      if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false; // Ctrl+Shift+J
      if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; // Ctrl+U
    };
  </script>
</head>
<body>
  <noscript>
    <div style="text-align: center; margin-top: 20%; font-family: sans-serif; color: #333;">
      <h2>JavaScript is Required</h2>
      <p>Please enable JavaScript in your browser settings to use the GuruDiary Web Portal.</p>
    </div>
  </noscript>

  <picture id="splash">
      <source srcset="splash/img/light-1x.png 1x, splash/img/light-2x.png 2x, splash/img/light-3x.png 3x, splash/img/light-4x.png 4x" media="(prefers-color-scheme: light)">
      <source srcset="splash/img/dark-1x.png 1x, splash/img/dark-2x.png 2x, splash/img/dark-3x.png 3x, splash/img/dark-4x.png 4x" media="(prefers-color-scheme: dark)">
      <img class="center" aria-hidden="true" src="splash/img/light-1x.png" alt="GuruDiary Splash Screen">
  </picture>
  
  <script src="flutter_bootstrap.js" async></script>

</body>
</html>
